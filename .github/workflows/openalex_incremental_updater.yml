name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - "**.md"

concurrency:
  # Skips intermediate builds and cancels intermediate builds
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.12"
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install and configure Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          virtualenvs-path: .venv
          installer-parallel: true

      - name: Load cached virtual environment
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: ~/.venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies if cache was not found
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction

      - name: Run test with pytest via poetry
        run: poetry run pytest --cov=openalex_incremental_updater --cov-report=xml

      - name: Code coverage reporting
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: "80 90"

      - name: Check if the code contains changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            oiu:
            - 'openalex_incremental_updater/**'

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: (github.event_name == 'pull_request') && (steps.changes.outputs.oiu == 'true')
        with:
          recreate: true
          path: code-coverage-results.md
