name: Promote openalex-incremental-updater to Azure Container Apps production deployment

concurrency: promote-incremental-updater-to-prod
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: openalex-incremental-updater

jobs:
  tag-image-for-prod:
    if: github.ref == 'refs/heads/main'
    name: "Add production tag to image"
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .

      - name: "Az CLI login"
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Tag image with production tag
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
        env:
          DOCKER_BUILDKIT: 1
      - run: |
          sha_short=$(git rev-parse --short HEAD)
          unique_tag="${sha_short}-prod"
          docker pull ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${sha_short}
          docker tag ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${sha_short} ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${unique_tag}
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${unique_tag}
      - name: Save unique tag for deployment
        run: echo "UNIQUE_TAG=${unique_tag}" >> $GITHUB_ENV

  deploy-to-production:
    if: github.ref == 'refs/heads/main'
    name: "Deploy to production"
    runs-on: ubuntu-latest
    needs: [tag-image-for-prod]
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy built image to Azure Container App
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME_PRODUCTION }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.UNIQUE_TAG }}
