name: Manually deploy openalex-incremental-updater to Azure Container Apps

on:
  workflow_dispatch:
    inputs:
      imageTag:
        description: "Image tag to deploy (leave empty to use latest commit SHA)"
        required: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      REGISTRY_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_NAME: openalex-incremental-updater
      RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
      CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: azure/cli@v2
        with:
          inlineScript: |
            az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build Docker image
        run: |
          export TAG=${{ github.event.inputs.imageTag || github.sha }}
          docker build -t ${REGISTRY_LOGIN_SERVER}/${IMAGE_NAME}:${TAG} openalex_incremental_updater/

      - name: Push Docker image
        run: |
          export TAG=${{ github.event.inputs.imageTag || github.sha }}
          docker push ${REGISTRY_LOGIN_SERVER}/$IMAGE_NAME:$TAG

      - name: Deploy to Azure Container App
        run: |
          export TAG=${{ github.event.inputs.imageTag || github.sha }}
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:$TAG
