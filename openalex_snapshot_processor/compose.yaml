# Inspired by https://docs.prefect.io/v3/how-to-guides/self-hosted/docker-compose
---
x-common: &common
  build:
    context: ..
    dockerfile: openalex_snapshot_processor/Dockerfile
  env_file:
    - .env
  environment:
    AZURE_CONFIG_DIR: /azcfg
  volumes:
    - ./prefect_config:/opt/packages/openalex_snapshot_processor/prefect_config
    - ${SNAPSHOT_ROOT_LOCAL}:${SNAPSHOT_ROOT}:ro
    - "${HOME}/.azure:/azcfg:rw"

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: prefect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build:
      context: ../openalex_incremental_updater
    ports:
      - "8000:8000"
    container_name: openalex-incremental-updater-api
    env_file:
      - ../openalex_incremental_updater/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      AZURE_CONFIG_DIR: /azcfg
      AZURE_LOG_LEVEL: DEBUG
    volumes:
      - "${HOME}/.azure:/azcfg:rw"

  prefect-server:
    image: prefecthq/prefect:3.6.21-python3.13
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_UI_API_URL: http://localhost:4200/api
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: redis
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_REDIS_MESSAGING_DB: 0
      PREFECT_SERVER_UI_SHOW_PROMOTIONAL_CONTENT: "false"
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
    command: prefect server start --no-services
    ports:
      - "4200:4200"
    healthcheck:
      test: [
          "CMD",
          "python",
          "-c",
          "import urllib.request as u; u.urlopen('http://localhost:4200/api/health', timeout=1)",
        ] # curl not included in the prefect image!
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  prefect-services:
    image: prefecthq/prefect:3.6.21-python3.13
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prefect
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: redis
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_REDIS_MESSAGING_DB: 0
    command: prefect server services start

  prefect-worker:
    <<: *common
    depends_on:
      prefect-server:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PREFECT_API_URL: ${PREFECT_API_URL}
    command: uv run prefect worker start --pool local-pool
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
