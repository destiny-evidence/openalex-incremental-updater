name: Manually deploy openalex-incremental-updater to Azure Container Apps

on:
  workflow_dispatch:
    inputs:
      imageTag:
        description: "Image tag to deploy (leave empty to use latest commit SHA)"
        required: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: openalex-incremental-updater

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push Docker image
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
      - run: |
          export TAG=${{ github.event.inputs.imageTag || github.sha }}
          docker build --build-arg GH_PAT=$GH_PAT -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${TAG} openalex_incremental_updater/
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${TAG}

      - name: Deploy to Azure Container App
        run: |
          export TAG=${{ github.event.inputs.imageTag || github.sha }}
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:$TAG
