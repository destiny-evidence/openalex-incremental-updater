name: Refresh requester tests

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "refresh_requester/**"

concurrency:
  # Skips intermediate builds and cancels intermediate builds
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  refresher-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.13"
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}
          cache: pip
          cache-dependency-path: refresh_requester/pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.9"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('refresh_requester/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('refresh_requester/uv.lock') }}
            uv-${{ runner.os }}

      - name: Install the project
        working-directory: refresh_requester
        run: uv sync --locked --all-extras --dev

      - name: Run test with pytest via uv
        working-directory: refresh_requester
        run: uv run pytest --cov=refresh_requester --cov-report=xml

      - name: Code coverage reporting
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: refresh_requester/coverage.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: file
          thresholds: "80 90"

      - name: Add title to coverage markdown file
        run: |
          echo '## Refresh Requester Coverage' > refresh-requester-coverage-results.md
          echo '---' >> refresh-requester-coverage-results.md
          cat code-coverage-results.md >> refresh-requester-coverage-results.md

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          header: "refresh-requester"
          recreate: true
          path: refresh-requester-coverage-results.md
